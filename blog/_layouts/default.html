<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  <div class="container">
    <header>
      <a href="{{ '/' | relative_url }}">
        <div class="site-title">{{ site.title }}</div>
        <div class="site-desc">{{ site.description }}</div>
      </a>
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      <p>{{ site.title }} &mdash; todos los derechos reservados</p>
    </footer>
  </div>
</body>
</html>
