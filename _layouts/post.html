---
layout: default
---
<article>
  <a class="back" href="{{ '/' | relative_url }}">Inicio</a>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%d de %B de %Y" }}</div>
  </header>
  {% if page.cover %}
  <figure class="post-cover">
    <img src="{{ page.cover | relative_url }}" alt="{{ page.title }}">
    {% if page.cover_credit %}<figcaption>{{ page.cover_credit | markdownify | remove: '<p>' | remove: '</p>' | strip }}</figcaption>{% endif %}
  </figure>
  {% endif %}
  <div class="post-body">
    {{ content }}
  </div>
  <nav class="post-nav">
    {% if page.next %}
    <a class="post-nav-item post-nav-older" href="{{ page.next.url | relative_url }}">
      <span class="post-nav-label">Anterior</span>
      <span class="post-nav-title">{{ page.next.title }}</span>
    </a>
    {% endif %}
    {% if page.previous %}
    <a class="post-nav-item post-nav-newer" href="{{ page.previous.url | relative_url }}">
      <span class="post-nav-label">Siguiente</span>
      <span class="post-nav-title">{{ page.previous.title }}</span>
    </a>
    {% endif %}
  </nav>
</article>
