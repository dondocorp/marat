---
layout: default
title: Inicio
---
<div class="random-wrap">
  <button class="random-btn" onclick="goRandom()">Texto al azar</button>
</div>

<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <span class="post-date">{{ post.date | date: "%d %b %Y" }}</span>
    <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
    {% if post.excerpt %}
    <p class="post-excerpt">{{ post.excerpt | strip_html | truncate: 200 }}</p>
    {% endif %}
  </li>
  {% endfor %}
</ul>

<script>
const posts = [{% for post in site.posts %}"{{ post.url | relative_url }}"{% unless forloop.last %},{% endunless %}{% endfor %}];
function goRandom() {
  window.location.href = posts[Math.floor(Math.random() * posts.length)];
}
</script>
